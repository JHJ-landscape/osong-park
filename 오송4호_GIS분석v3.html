  #header h1 { font-size:16px; font-weight:700; color:#fff; }
  #header .badge { background:#e94560; color:#fff; padding:3px 10px; border-radius:20px; font-size:11px; }
  #container { display:flex; height:calc(100vh - 50px); }
  #map { flex:1; }
  #panel { width:320px; background:#16213e; overflow-y:auto; border-left:1px solid #0f3460; display:flex; flex-direction:column; }
  .tab-bar { display:flex; background:#0f3460; border-bottom:1px solid #1a3a6e; }
  .tab { flex:1; padding:10px 0; text-align:center; cursor:pointer; font-size:12px; color:#8892b0; border-bottom:2px solid transparent; transition:all 0.2s; }
  .tab.active { color:#64ffda; border-bottom-color:#64ffda; }
  .tab-content { display:none; padding:16px; }
  .tab-content.active { display:block; }
  .info-card { background:#0f3460; border-radius:8px; padding:12px; margin-bottom:10px; border-left:3px solid #e94560; }
  .info-card h3 { font-size:10px; color:#8892b0; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; }
  .info-card .value { font-size:20px; font-weight:700; color:#ccd6f6; }
  .info-card .unit { font-size:11px; color:#8892b0; margin-left:3px; }
  .info-card .sub { font-size:11px; color:#64ffda; margin-top:3px; }
  .info-card .desc { font-size:12px; color:#ccd6f6; line-height:1.6; }
  .section-title { font-size:10px; color:#8892b0; text-transform:uppercase; letter-spacing:1px; margin:12px 0 6px; }
  .layer-btn { display:block; width:100%; padding:8px 12px; margin-bottom:5px; border:1px solid #0f3460; border-radius:6px; background:#0f3460; color:#ccd6f6; cursor:pointer; font-size:12px; text-align:left; transition:all 0.2s; }
  .layer-btn:hover { background:#1a3a6e; }
  .layer-btn.active { background:#e94560; border-color:#e94560; color:#fff; }
  .analysis-btn { display:block; width:100%; padding:10px; margin-bottom:6px; border:1px solid #1a3a6e; border-radius:8px; background:linear-gradient(135deg,#0f3460,#1a3a6e); color:#64ffda; cursor:pointer; font-size:13px; font-weight:600; text-align:left; transition:all 0.2s; }
  .analysis-btn:hover { border-color:#64ffda; }
  .analysis-btn.done { border-color:#64ffda; }
  #land-table-wrap { overflow-x:auto; margin-top:10px; }
  table { width:100%; border-collapse:collapse; font-size:11px; }
  th { background:#0f3460; color:#64ffda; padding:6px 4px; text-align:center; border:1px solid #1a3a6e; white-space:nowrap; }
  td { padding:5px 4px; text-align:center; border:1px solid #1a3a6e; color:#ccd6f6; }
  tr:hover td { background:#0f3460; }
  .total-row td { background:#0a1628; color:#FFD700; font-weight:700; }
  #land-status { color:#8892b0; font-size:12px; text-align:center; padding:20px 0; }
  .spinner { border:3px solid #1a3a6e; border-top:3px solid #64ffda; border-radius:50%; width:24px; height:24px; animation:spin 1s linear infinite; margin:10px auto; }

function showTab(name,el){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
}

function setLayer(type){
  map.removeLayer(currentLayer);
  currentLayer=bgLayers[type];
  map.addLayer(currentLayer);
  currentLayer.bringToBack();
  document.getElementById(activeBgBtn).classList.remove('active');
  activeBgBtn='btn-'+type;
  document.getElementById(activeBgBtn).classList.add('active');
}

function toggleVworld(key, layerName, btnId){
  if(!vworldLayers[key]){
    vworldLayers[key] = L.tileLayer.wms('https://api.vworld.kr/req/wms',{
      layers: layerName,
      format: 'image/png',
      transparent: true,
      version: '1.3.0',
      key: API_KEY,
      domain: DOMAIN,
      opacity: 0.7,
      attribution: 'VWORLD'
    });
    vworldOn[key] = false;
  }
  if(vworldOn[key]){
    map.removeLayer(vworldLayers[key]);
    document.getElementById(btnId).classList.remove('active');
    vworldOn[key]=false;
  }else{
    vworldLayers[key].addTo(map);
    document.getElementById(btnId).classList.add('active');
    vworldOn[key]=true;
  }
}

function fetchLandData(){
  var btn = document.getElementById('btn-fetch-land');
  btn.textContent='⏳ 불러오는 중...';
  document.getElementById('land-status').innerHTML='<div class="spinner"></div><p>VWORLD 토지정보 조회 중...</p>';
  document.getElementById('land-table-wrap').innerHTML='';

  var bounds = sitePolygon.getBounds();
  var box = bounds.getWest().toFixed(6)+','+bounds.getSouth().toFixed(6)+','+bounds.getEast().toFixed(6)+','+bounds.getNorth().toFixed(6);

  var cbName = 'vwCb'+Date.now();
  var url = 'https://api.vworld.kr/req/data'
    +'?service=data&version=2.0&request=GetFeature'
    +'&data=LP_PA_CBND_BUBUN'
    +'&key='+API_KEY
    +'&domain='+DOMAIN
    +'&size=1000&page=1'
    +'&geometry=true&attribute=true'
    +'&crs=EPSG:4326'
    +'&geomFilter=BOX('+box+')'
    +'&callback='+cbName;

  // 디버그
  var dbg = document.getElementById('debug-box');
  dbg.style.display='block';
  dbg.textContent = 'URL: '+url;

  window[cbName] = function(data){
    document.head.querySelector('script[data-cb="'+cbName+'"]')?.remove();
    delete window[cbName];
    dbg.textContent += '\n응답: '+JSON.stringify(data).slice(0,200);
    try{
      var features = data.response.result.featureCollection.features;
      processLandData(features);
    }catch(e){
      document.getElementById('land-status').innerHTML='❌ 응답 오류: '+JSON.stringify(data?.response?.status||e.message);
      btn.textContent='📊 토지조서 다시 불러오기';
    }
  };

  var s=document.createElement('script');
  s.setAttribute('data-cb',cbName);
  s.onerror=function(){
    document.getElementById('land-status').innerHTML='❌ 스크립트 로드 실패 (404/네트워크 오류)';
    btn.textContent='📊 토지조서 다시 불러오기';
    dbg.textContent+='\n→ script.onerror 발생';
  };
  s.src=url;
  document.head.appendChild(s);
}
